<header class="site-head">
  <div>
    <div class="brand-kicker mono">{{ site.tagline }}</div>
    <a class="brand" href="{{ site.url }}">{{ site.title }}</a>
  </div>
  <div class="nav-wrap">
    <nav class="nav">
      <a class="{% if page.url == '/' %}active{% endif %}" href="{{ site.url }}">Home</a>
      <a class="{% if page.url contains 'archive' %}active{% endif %}" href="{{ site.url }}/archive">Archive</a>
      <a class="{% if page.url contains 'projects' or page.category == 'projects' %}active{% endif %}" href="{{ site.url }}/projects">Projects</a>
      <a class="{% if page.url contains 'about' %}active{% endif %}" href="{{ site.url }}/about">About</a>
      <a href="https://steveripplinger.substack.com" target="_blank" rel="noopener">Newsletter<svg class="ext-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h6"/></svg></a>
    </nav>
    <button class="theme-toggle" id="theme-toggle" onclick="modeSwitcher()" type="button" aria-label="Toggle dark mode"></button>
  </div>
</header>
